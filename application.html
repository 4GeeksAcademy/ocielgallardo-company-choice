<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Form</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #eef2ff, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    label {
      display: block;
      font-weight: 600;
      margin: 12px 0 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 1rem;
    }

    .error {
      color: var(--danger);
      margin: 4px 0 0;
      min-height: 18px;
      font-size: 0.9rem;
    }

    button {
      margin-top: 14px;
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 14px;
      cursor: pointer;
    }

    #status {
      margin-top: 14px;
      font-weight: 600;
      min-height: 22px;
    }

    #status.ok {
      color: var(--ok);
    }

    #status.fail {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Formulario de aplicación</h1>
    <p>Completa tus datos y valida el formulario.</p>

    <form id="application-form" novalidate>
      <label for="fullName">Nombre completo</label>
      <input id="fullName" name="fullName" type="text" placeholder="Tu nombre" />
      <p id="fullName-error" class="error" aria-live="polite"></p>

      <label for="email">Correo electrónico</label>
      <input id="email" name="email" type="email" placeholder="tu@email.com" />
      <p id="email-error" class="error" aria-live="polite"></p>

      <label for="phone">Teléfono</label>
      <input id="phone" name="phone" type="tel" placeholder="10 dígitos" />
      <p id="phone-error" class="error" aria-live="polite"></p>

      <button type="submit">Enviar</button>
      <p id="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="validation.js" defer></script>
</body>
</html>
