<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthCore | Registro de Paciente</title>
  <meta name="description" content="Formulario de registro seguro para pacientes de HealthCore con proteccion de datos medicos y flujo de aplicacion digital." />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur" role="banner">
    <div class="mx-auto flex h-16 max-w-5xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="index.html" class="inline-flex items-center gap-2 rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2" aria-label="Volver al inicio de HealthCore">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-blue-100 text-blue-700" aria-hidden="true">
          <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18M12 3a13 13 0 0 1 0 18M12 3a13 13 0 0 0 0 18"></path>
          </svg>
        </span>
        <span class="font-bold">HealthCore</span>
      </a>
      <a href="index.html" class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600">Volver al sitio</a>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8" role="main">
    <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-8" aria-labelledby="form-title">
      <header class="mb-8">
        <h1 id="form-title" class="text-2xl font-extrabold text-slate-900 sm:text-3xl">Formulario de registro / aplicacion</h1>
        <p class="mt-3 text-slate-600">Completa tus datos para agendar una evaluacion inicial con nuestro equipo clinico en USA o UK.</p>
      </header>

      <form id="application-form" novalidate class="space-y-8" aria-describedby="form-status">
        <fieldset class="space-y-5 rounded-xl border border-slate-200 p-5">
          <legend class="px-2 text-base font-semibold text-slate-900">Informacion personal</legend>

          <div class="grid gap-5 md:grid-cols-2">
            <div>
              <label for="fullName" class="mb-2 block text-sm font-medium text-slate-700">Nombre completo *</label>
              <input id="fullName" name="fullName" type="text" autocomplete="name" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="fullName-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="dob" class="mb-2 block text-sm font-medium text-slate-700">Fecha de nacimiento *</label>
              <input id="dob" name="dob" type="date" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="dob-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email *</label>
              <input id="email" name="email" type="email" autocomplete="email" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="email-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="phone" class="mb-2 block text-sm font-medium text-slate-700">Telefono *</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="phone-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="country" class="mb-2 block text-sm font-medium text-slate-700">Pais *</label>
              <input id="country" name="country" type="text" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="country-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="address" class="mb-2 block text-sm font-medium text-slate-700">Direccion *</label>
              <input id="address" name="address" type="text" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="address-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>
          </div>
        </fieldset>

        <fieldset class="space-y-5 rounded-xl border border-slate-200 p-5">
          <legend class="px-2 text-base font-semibold text-slate-900">Informacion medica</legend>

          <div class="grid gap-5 md:grid-cols-2">
            <div>
              <label for="consultationType" class="mb-2 block text-sm font-medium text-slate-700">Tipo de consulta *</label>
              <select id="consultationType" name="consultationType" required class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30">
                <option value="">Selecciona una opcion</option>
                <option value="primary">Atencion primaria</option>
                <option value="specialist">Consulta con especialista</option>
                <option value="chronic">Manejo de enfermedad cronica</option>
                <option value="preventive">Salud preventiva</option>
              </select>
              <p id="consultationType-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="preferredClinic" class="mb-2 block text-sm font-medium text-slate-700">Clinica preferida *</label>
              <select id="preferredClinic" name="preferredClinic" required class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30">
                <option value="">Selecciona una clinica</option>
                <option value="boston-us">Boston Downtown Clinic (US)</option>
                <option value="austin-us">Austin Central Clinic (US)</option>
                <option value="seattle-us">Seattle North Clinic (US)</option>
                <option value="london-uk">London City Clinic (UK)</option>
                <option value="manchester-uk">Manchester West Clinic (UK)</option>
              </select>
              <p id="preferredClinic-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div>
              <label for="insuranceProvider" class="mb-2 block text-sm font-medium text-slate-700">Seguro medico *</label>
              <input id="insuranceProvider" name="insuranceProvider" type="text" required placeholder="Nombre de aseguradora o No insurance" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" />
              <p id="insuranceProvider-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>

            <div class="md:col-span-2">
              <label for="medicalHistory" class="mb-2 block text-sm font-medium text-slate-700">Historial medico basico *</label>
              <textarea id="medicalHistory" name="medicalHistory" rows="4" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm shadow-sm transition focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30" placeholder="Incluye diagnosticos previos, alergias y medicamentos actuales."></textarea>
              <p id="medicalHistory-error" class="mt-1 min-h-5 text-sm text-red-600" aria-live="polite"></p>
            </div>
          </div>
        </fieldset>

        <fieldset class="space-y-4 rounded-xl border border-slate-200 p-5">
          <legend class="px-2 text-base font-semibold text-slate-900">Consentimiento y privacidad</legend>
          <div class="flex items-start gap-3">
            <input id="consent" name="consent" type="checkbox" required class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-600" />
            <label for="consent" class="text-sm text-slate-700">Acepto el tratamiento de datos personales y medicos conforme a politicas de privacidad, HIPAA y GDPR. *</label>
          </div>
          <p id="consent-error" class="min-h-5 text-sm text-red-600" aria-live="polite"></p>
        </fieldset>

        <div class="flex flex-col gap-3 sm:flex-row">
          <button type="submit" class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600">Enviar aplicacion</button>
          <button type="reset" class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600">Limpiar formulario</button>
        </div>

        <p id="form-status" class="min-h-6 text-sm font-medium" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="validation.js" defer></script>
</body>
</html>
